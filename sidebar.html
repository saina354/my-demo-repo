<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#1e293b;
    position:fixed;
    left:0;
    top:0;
    padding-top:30px;
}

.sidebar h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:.3s;
}

.sidebar a:hover{
    background:#2563eb;
}

.content{
    margin-left:260px;
    padding:30px;
}

</style>

</head>
<body>

<div class="sidebar">

<h2>Dashboard</h2>

<a href="#">🏠 Home</a>
<a href="#">👤 Profile</a>
<a href="#">📦 Products</a>
<a href="#">🛒 Orders</a>
<a href="#">📊 Reports</a>
<a href="#">⚙ Settings</a>
<a href="#">🚪 Logout</a>

</div>

<div class="content">

<h1>Welcome</h1>

<p>
This is the main content area.
</p>

</div>

</body>
</html>
